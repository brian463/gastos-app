name: gastos_app
description: MVP base para registrar ingresos y gastos, dashboard y export CSV en Web.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  excel: ^4.0.6
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  universal_html: ^2.2.4
  pdf: ^3.11.0
  printing: ^5.13.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  http: ^1.2.2
flutter:
  uses-material-design: true
